<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial;
    background: linear-gradient(135deg,#e6f0fa,#ffffff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* simulación */
.badge{
    position:absolute;
    top:10px;
    left:10px;
    background:#facc15;
    font-size:12px;
    padding:6px 10px;
    border-radius:6px;
}

/* card estilo Microsoft */
.card{
    width:380px;
    background:white;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

/* logo */
.logo{
    font-size:14px;
    color:#666;
    margin-bottom:10px;
    display:flex;
    align-items:center;
}

.logo-box{
    width:16px;height:16px;
    background:#0078d4;
    margin-right:8px;
}

/* títulos */
h2{
    margin:10px 0 5px;
}

.sub{
    color:#666;
    font-size:13px;
    margin-bottom:20px;
}

/* inputs estilo real */
input{
    width:100%;
    border:none;
    border-bottom:1px solid #888;
    padding:10px 5px;
    font-size:14px;
    outline:none;
}

input:focus{
    border-color:#0078d4;
}

/* links */
.links a{
    color:#0067b8;
    font-size:13px;
    text-decoration:none;
}

.links{
    margin-top:10px;
}

/* botón */
button{
    float:right;
    padding:8px 20px;
    background:#0067b8;
    border:none;
    color:white;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#005ea6;
}

/* avatar */
.avatar{
    width:40px;
    border-radius:50%;
    margin:10px 0;
}

/* loader */
.loader{
    border:4px solid #eee;
    border-top:4px solid #0078d4;
    border-radius:50%;
    width:40px;height:40px;
    animation:spin 1s linear infinite;
    margin:auto;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

.hidden{
    display:none;
}

.center{
    text-align:center;
}

.timer{
    font-size:12px;
    text-align:right;
    color:#666;
}
</style>
</head>

<body>

<div class="badge">Simulación</div>

<div class="card">

<div id="timer" class="timer">02:00</div>

<!-- PASO 1 -->
<div id="step1">
    <div class="logo">
        <div class="logo-box"></div> Microsoft
    </div>

    <h2>Iniciar sesión</h2>
    <div class="sub">Continuar a Outlook</div>

    <input id="correo" placeholder="Correo electrónico, teléfono o Skype">

    <div id="error" style="color:red;font-size:12px;"></div>

    <div class="links">
        #¿No tiene cuenta?</a><br>
        #¿Olvidó su usuario?</a>
    </div>

    <button onclick="next()">Siguiente</button>
</div>

<!-- PASO 2 -->
<div id="step2" class="hidden">

    <div id="mail"></div>
    <img id="avatar" class="avatar">

    <input id="pass" type="password" placeholder="Contraseña">

    <div id="errorPass" style="color:red;font-size:12px;"></div>

    <button onclick="login()">Iniciar sesión</button>
</div>

<!-- LOADING -->
<div id="loading" class="hidden center">
    <div class="loader"></div>
    <p>Iniciando sesión...</p>
</div>

<!-- FINAL -->
<div id="final" class="hidden center">
    <h3>✅ Simulación completada</h3>
    <p style="font-size:13px;color:#666">
    Señales de alerta:<br>
    - Página solicitó credenciales<br>
    - No verificaste URL<br>
    - Uso de urgencia (timer)
    </p>
</div>

</div>

<script>
let tiempo = 120;

setInterval(()=>{
    tiempo--;

    if(tiempo < 0) tiempo = 120;

    let m = Math.floor(tiempo/60);
    let s = tiempo%60;

    const t = document.getElementById("timer");

    t.innerText =
        String(m).padStart(2,"0")+":"+
        String(s).padStart(2,"0");

    if(tiempo < 20) t.style.color="red";

},1000);

function next(){

    let correo = document.getElementById("correo").value;

    if(!correo.includes("@")){
        document.getElementById("error").innerText =
        "Ingrese un correo válido";
        return;
    }

    document.getElementById("error").innerText = "";

    document.getElementById("mail").innerText = correo;

    document.getElementById("avatar").src =
    "https://ui-avatars.com/api/?name="+correo;

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
}

function login(){

    let pass = document.getElementById("pass").value;

    if(pass.length < 4){
        document.getElementById("errorPass").innerText =
        "Contraseña incorrecta";
        return;
    }

    document.getElementById("step2").classList.add("hidden");
    document.getElementById("loading").classList.remove("hidden");

    setTimeout(()=>{
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("final").classList.remove("hidden");
    },2000);
}
</script>

</body>
</html>
